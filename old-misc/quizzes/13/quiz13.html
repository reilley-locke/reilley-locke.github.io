<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>JSON: Task 1</title>
  <style>
    p {
      color: purple;
      margin: 0.5em 0;
    }

    * {
      box-sizing: border-box;
    }
  </style>
</head>

<body>

  <section class="preview">



  </section>

</body>
<script>
  const section = document.querySelector('section');

  let para1 = document.createElement('p');
  let para2 = document.createElement('p');
  let motherInfo = 'The mother cats are called ';
  let kittenInfo = 'There are ';

  async function populate() {
  const requestURL = 'https://mdn.github.io/learning-area/javascript/oojs/tasks/json/sample.json';

  const request = new Request(requestURL);

  const response = await fetch(request);
  const catText = await response.text();

  const cats = JSON.parse(catText);
  displayCatInfo(cats)
  }

  function displayCatInfo(catString) {
    let total = 0;
    let male = 0;

    // Add your code here
    console.log(catString)
    
    for (var i = 0; i<catString.length; i++)
    {
      let mother = catString[i];
      let kittenArray = catString[i].kittens;
  
      if (i < catString.length-1)
      {
        motherInfo += mother.name + ', ';
      }
      
      if (i === catString.length-2)
      {
        motherInfo += ' and ';
      }
      if (i === catString.length-1)
      {
        motherInfo += mother.name + '.';
      }

      for (var k = 0; k<kittenArray.length; k++)
      {
        total++;
        if (kittenArray[k].gender === 'm')
        {
          male++;
        }
      }
      
    }
    let female = total - male;
    kittenInfo += total + ' kittens total. ';
    kittenInfo += male + ' are male, while ' + female + ' are female.';
    


    // Don't edit the code below here!

    para1.textContent = motherInfo;
    para2.textContent = kittenInfo;
  }

  section.appendChild(para1);
  section.appendChild(para2);
  populate();

</script>

</html>
