<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="wa12.css">
    <title>Color Generator</title>
  </head>

  <body>
    <div class="app">
      <header>Random Color Generator</header>
      <div class="checkbox">
        <input type="checkbox" id="animation" onclick="stopAnimation()"> Stop
        background color animation
      </div>
      <div class="singleColorBox">
        <div id="oneColorBox"></div>
        <div id="colorHex"></div>
      </div>
      <div class="palette">
      <div class="paletteBox">
        <div class="colorBox"></div>
        <div class="colorBox"></div>
        <div class="colorBox"></div>
        <div class="colorBox"></div>
        <div class="colorBox"></div>
      </div>
      <div class="paletteBoxNames">
        <div class="colorBoxName"></div>
        <div class="colorBoxName"></div>
        <div class="colorBoxName"></div>
        <div class="colorBoxName"></div>
        <div class="colorBoxName"></div>
      </div>
      </div>
      <div class="controls">
        <button type="button" id="single-color" class="new-quote button">
          Generate a new color!
        </button>
        <button type="button" id="palette" class="twitter button">
          Generate a color palette!
        </button>
      </div>
    </div>

    <script src="wa12.js"></script>
  </body>
</html>
